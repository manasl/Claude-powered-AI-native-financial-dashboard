_format_version: "1.1"

# Kong declarative configuration for self-hosted Supabase
# Routes /rest/v1/* → PostgREST
#
# Auth strategy: JWT-only via PostgREST (PGRST_JWT_SECRET)
#   - PostgREST validates the Authorization: Bearer <jwt> header directly
#   - Kong adds CORS and passes requests through
#   - No key-auth plugin: avoids env-var substitution issues with Kong 2.x
#     and removes the redundant apikey layer for a single-user local deployment

services:
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:3001"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-Type
            - Date
            - apikey
            - Authorization
            - Prefer
          exposed_headers:
            - X-Kong-Upstream-Latency
            - X-Kong-Proxy-Latency
          credentials: true
          max_age: 3600
