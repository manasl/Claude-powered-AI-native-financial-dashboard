_format_version: "1.1"
_transform: true

# Kong declarative configuration for self-hosted Supabase
# Routes /rest/v1/* → PostgREST
# JWT validation is done by PostgREST itself (PGRST_JWT_SECRET)
# Kong adds CORS and key-auth so only valid apikeys reach PostgREST

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:3001"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-Type
            - Date
            - apikey
            - Authorization
            - Prefer
          exposed_headers:
            - X-Kong-Upstream-Latency
            - X-Kong-Proxy-Latency
          credentials: true
          max_age: 3600
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey
            - Authorization
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin
